<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <header>Sign Up</header>
        </div>
        <div class="input-box">
            <input type="text" id="signup-email" class="input-field" placeholder="Email" autocomplete="off" required>
        </div>
        <div class="input-box">
            <input type="text" id="signup-username" class="input-field" placeholder="Username" autocomplete="off" required>
        </div>
        <div class="input-box">
            <input type="password" id="signup-password" class="input-field" placeholder="Password" autocomplete="off" required>
        </div>
        <div class="input-submit">
            <button class="submit-btn" id="signup-btn"></button>
            <label for="signup-btn">Create Account</label>
        </div>
        <div class="sign-up-link">
            <p>Already have an account? <a href="login.html">Log in</a></p>
        </div>
        <div class="back-to-home">
            <p id="signup-message"></p>
            <a href="index.html">Back to Home</a>
        </div>
    </div>
    <script src="./js/signup.js"></script>
</body>
</html>
