<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduTech</title>
</head>
<body>
<h1>EduTech Topics</h1>

<div th:each="topic : ${topics}">
    <a th:href="@{'/topics/' + ${topic.id}}">
        <div style="border:1px solid black; margin:10px; padding:20px; width:200px;">
            <h2 th:text="${topic.name}">Topic Name</h2>
        </div>
    </a>
</div>
</body>
</html>
